<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flip-dle Prototype</title>
    <style>
        body {
            font-family: 'Clear Sans', 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #121213;
            color: white;
            margin: 0;
            padding: 20px;
        }
        h1 { margin-bottom: 5px; }
        p { color: #818384; margin-top: 0; text-align: center; max-width: 400px; margin-bottom: 20px;}
        
        #board {
            display: grid;
            grid-template-rows: repeat(6, 1fr);
            grid-gap: 5px;
            margin-bottom: 20px;
        }
        .row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-gap: 5px;
        }
        .tile {
            width: 60px;
            height: 60px;
            border: 2px solid #3a3a3c;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: bold;
            text-transform: uppercase;
        }
        
        /* Active typing border */
        .tile.active { border-color: #818384; }

        /* The Magic Flip Class */
        .flipped {
            transform: rotate(180deg);
            color: #ff9800; /* Colors flipped letters slightly orange */
        }

        /* Wordle Colors */
        .correct { background-color: #538d4e; border-color: #538d4e; }
        .present { background-color: #b59f3b; border-color: #b59f3b; }
        .absent { background-color: #3a3a3c; border-color: #3a3a3c; }

        #message { font-weight: bold; font-size: 1.2rem; height: 1.5rem; }
    </style>
</head>
<body>

    <h1>FLIP-DLE</h1>
    <p>Target word: SWORD. M, W, B, Q, D, P, N, and U have a 50% chance to flip 180° before being graded!</p>

    <div id="board"></div>
    <div id="message"></div>

    <script>
        // Prototype Settings
        const TARGET_WORD = "SWORD"; 
        const MAX_GUESSES = 6;
        let currentGuessCount = 0;
        let currentGuess = "";
        let gameOver = false;

        // The Flip Dictionary
        const FLIP_MAP = {
            'M': 'W', 'W': 'M',
            'B': 'Q', 'Q': 'B',
            'D': 'P', 'P': 'D',
            'N': 'U', 'U': 'N'
        };

        // Initialize Board
        const board = document.getElementById('board');
        for (let i = 0; i < MAX_GUESSES; i++) {
            const row = document.createElement('div');
            row.className = 'row';
            for (let j = 0; j < 5; j++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                row.appendChild(tile);
            }
            board.appendChild(row);
        }

        function showMessage(msg) {
            const msgDiv = document.getElementById('message');
            msgDiv.innerText = msg;
            // Clear message after 2 seconds unless game is over
            if (!gameOver && msg !== "") {
                setTimeout(() => { msgDiv.innerText = ""; }, 2000);
            }
        }

        function updateBoard() {
            if (gameOver) return;
            let rowNodes = document.querySelectorAll('.row')[currentGuessCount].children;
            for (let i = 0; i < 5; i++) {
                rowNodes[i].innerText = currentGuess[i] || "";
                if (currentGuess[i]) {
                    rowNodes[i].classList.add('active');
                } else {
                    rowNodes[i].classList.remove('active');
                }
            }
        }

        function submitGuess() {
            if (currentGuess.length !== 5) {
                showMessage("Not enough letters");
                return;
            }

            let finalGuess = "";
            let flipStatus = []; 
            let rowNodes = document.querySelectorAll('.row')[currentGuessCount].children;

            // 1. Transform the guess (The Flip-dle Mechanic)
            for (let i = 0; i < 5; i++) {
                let char = currentGuess[i];
                if (FLIP_MAP[char] && Math.random() > 0.5) {
                    finalGuess += FLIP_MAP[char];
                    flipStatus.push(true);
                } else {
                    finalGuess += char;
                    flipStatus.push(false);
                }
            }

            // 2. Grade the transformed guess
            let targetArray = TARGET_WORD.split('');
            let guessArray = finalGuess.split('');
            let colors = new Array(5).fill('absent');

            // Pass 1: Exact Matches (Greens)
            for (let i = 0; i < 5; i++) {
                if (guessArray[i] === targetArray[i]) {
                    colors[i] = 'correct';
                    targetArray[i] = null; 
                }
            }

            // Pass 2: Partial Matches (Yellows)
            for (let i = 0; i < 5; i++) {
                if (colors[i] === 'correct') continue;
                let targetIndex = targetArray.indexOf(guessArray[i]);
                if (targetIndex !== -1) {
                    colors[i] = 'present';
                    targetArray[targetIndex] = null; 
                }
            }

            // 3. Render the row colors and flips
            for (let i = 0; i < 5; i++) {
                rowNodes[i].classList.remove('active');
                rowNodes[i].classList.add(colors[i]);
                
                // If it flipped, show the visually flipped original letter
                if (flipStatus[i]) {
                    rowNodes[i].classList.add('flipped');
                }
            }

            // 4. Check Win/Loss
            currentGuessCount++;
            
            if (finalGuess === TARGET_WORD) {
                showMessage("You win! You decoded the flips.");
                gameOver = true;
            } else if (currentGuessCount >= MAX_GUESSES) {
                showMessage("Game Over. The word was " + TARGET_WORD);
                gameOver = true;
            } else {
                currentGuess = ""; // Reset for next line
            }
        }

        // Global Keyboard Listener
        document.addEventListener("keydown", (e) => {
            if (gameOver) return;

            let key = e.key.toUpperCase();

            if (key === "ENTER") {
                submitGuess();
            } else if (key === "BACKSPACE") {
                currentGuess = currentGuess.slice(0, -1);
                updateBoard();
            } else if (/^[A-Z]$/.test(key)) {
                if (currentGuess.length < 5) {
                    currentGuess += key;
                    updateBoard();
                }
            }
        });
    </script>
</body>
</html>
